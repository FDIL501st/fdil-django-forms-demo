# Use postgres/example user/password credentials

services:
  db:
    image: postgres
    container_name: ${PG_HOST}
    restart: always
    # set shared memory limit when using docker compose
    shm_size: 128mb
    # or set shared memory limit when deploy via swarm stack
    #volumes:
    #  - type: tmpfs
    #    target: /dev/shm
    #    tmpfs:
    #      size: 134217728 # 128*2^20 bytes = 128Mb
    environment:
      POSTGRES_PASSWORD: ${PG_PASSWORD}
      POSTGRES_USER: ${PG_USER}
      POSTGRES_DB: ${PG_DB}
    ports:
      - ${PG_PORT}:5432
    volumes:
      - ./postgres-data:/var/lib/postgresql
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${PG_USER} -d ${PG_DB}" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  adminer:
    image: adminer
    restart: always
    ports:
      - "8081:8080"
    depends_on:
      db:
        condition: service_healthy

  app:
    build:
      context: .
    env_file:
      - .env
    environment:
      CMAKE_ARGS: "-DGGML_VULKAN=on"
      COMPOSE: True
    volumes:
      - ./gemma-4-26B-A4B-it-qat-UD-Q4_K_XL.gguf:/app/gemma-4-26B-A4B-it-qat-UD-Q4_K_XL.gguf:ro
    ports:
      - "8080:8000"
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres-data:
    name: "django_forms"
