<!DOCTYPE html>
<html lang="en">
{% load static %}
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <link rel="stylesheet" href="{% static 'forms/style.css' %}">
    <title>{% block title %} Forms App {% endblock %}</title>
</head>
<body class="bg-white dark:bg-gray-900">
<nav class="border-solid border-gray-200">
    <!-- Links -->
    <div class="flex flex-wrap justify-start items-stretch bg-sky-100 dark:bg-sky-900">
        <div class="px-4 bg-stone-200 hover:bg-blue-800">
            <a href="{% url 'index' %}" class="text-xl text-gray-500">Home</a>
        </div>
        <div class="px-4 bg-stone-400 hover:bg-blue-800">
            <a href="{% url 'forms:report' %}" class="text-lg text-gray-500">Form</a>
        </div>

    </div>
</nav>

{% block body %}
{% endblock body %}
</body>
</html>
